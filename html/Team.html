<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team | Architect Studio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />



    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

    <!-- Navbar (Overlay on Hero) -->
    <div id="navbar" class="absolute top-0 left-0 w-full z-50"></div>

   <!-- Hero Section -->
<section class="relative w-full h-[50vh] md:h-[80vh]">
    <!-- Hero Image -->
    <img src="../assests/hero.jpeg" alt="Architect Cover"
     class="absolute inset-0 w-full h-full object-cover" />
    
    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 h-full flex items-end px-8 pb-10 md:px-32 md:pb-20 text-white font-playfair">
        <h1 class="text-4xl md:text-7xl font-bold">
            Team
        </h1>
    </div>
</section>



   <section class="bg-[#fdfcfb] py-24 md:py-32 overflow-hidden">
    <div class="max-w-6xl mx-auto px-6">

        <div class="text-center mb-20" data-aos="fade-up">
            <span class="text-[10px] uppercase tracking-[0.5em] text-amber-600 font-semibold mb-4 block">
                The People Behind the Vision
            </span>
            <h2 class="font-serif text-5xl md:text-6xl text-slate-900 tracking-tight">
                Our Leadership
            </h2>
            <div class="w-12 h-[1px] bg-amber-600 mx-auto mt-8"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 lg:gap-24">

            <div class="group cursor-default" data-aos="fade-up" data-aos-delay="100">
                <div class="relative overflow-hidden rounded-3xl bg-slate-100 aspect-[4/5]">
                    <img src="../assests/aman.png" alt="Md. Aman Ullah"
                        class="w-full h-full object-cover object-top transition-transform duration-1000 group-hover:scale-105" />
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-80"></div>

                    <div class="absolute bottom-6 left-6 right-6 p-6 backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl">
                        <p class="text-[10px] uppercase tracking-[0.3em] text-amber-400 mb-1 font-bold">
                            Managing Director</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-white font-serif">Md. Aman Ullah</h3>
                    </div>
                </div>
                
                <div class="mt-8 px-2 border-l-2 border-amber-100 ml-4">
                    <p class="text-slate-500 italic font-serif text-xl leading-relaxed">
                        "Where dreams rise higher than buildings."
                    </p>
                </div>
            </div>

            <div class="group cursor-default" data-aos="fade-up" data-aos-delay="200">
                <div class="relative overflow-hidden rounded-3xl bg-slate-100 aspect-[4/5]">
                    <img src="../assests/hasan.jpeg" alt="Md. Hasan"
                        class="w-full h-full object-cover object-top transition-transform duration-1000 group-hover:scale-105" />
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-80"></div>

                    <div class="absolute bottom-6 left-6 right-6 p-6 backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl">
                        <p class="text-[10px] uppercase tracking-[0.3em] text-amber-400 mb-1 font-bold">
                            Founder</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-white font-serif">Md. Hasan</h3>
                    </div>
                </div>

                <div class="mt-8 px-2 border-l-2 border-amber-100 ml-4">
                    <p class="text-slate-500 italic font-serif text-xl leading-relaxed">
                        "Creating spaces for living, not just staying"
                    </p>
                </div>
            </div>

        </div>
    </div>
</section>


  <div id="footer"></div>


    <!-- Navbar Loader -->
    <script src="../js/main.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            easing: "ease-in-out",
        });
    </script>
    <script>
        const row = document.getElementById("imageRow");
        const leftBtn = document.getElementById("leftBtn");
        const rightBtn = document.getElementById("rightBtn");

        leftBtn.addEventListener("click", () => {
            row.scrollBy({ left: -300, behavior: "smooth" });
        });

        rightBtn.addEventListener("click", () => {
            row.scrollBy({ left: 300, behavior: "smooth" });
        });

    </script>



</body>

</html>
