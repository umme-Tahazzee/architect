<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team | Architect Studio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />



    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

    <!-- Navbar (Overlay on Hero) -->
    <div id="navbar" class="absolute top-0 left-0 w-full z-50"></div>

   <!-- Hero Section -->
<section class="relative w-full h-[50vh] md:h-[80vh]">
    <!-- Hero Image -->
    <img src="../assests/hero.jpeg" alt="Architect Cover" class="absolute inset-0 w-full h-full object-cover" />
    
    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 h-full flex items-end px-8 pb-10 md:px-32 md:pb-20 text-white font-playfair">
        <h1 class="text-4xl md:text-7xl font-bold">
            Team
        </h1>
    </div>
</section>



   <!-- ─── LEADERSHIP ─── -->
    <section class="bg-cream py-20 md:py-28">
        <div class="max-w-6xl mx-auto px-6 md:px-10">

            <div class="text-center mb-16" data-aos="fade-up">
                <p class="text-xs uppercase tracking-[0.3em] text-gold font-medium mb-3">The People Behind the Vision
                </p>
                <h2 class="font-display text-4xl md:text-5xl font-bold text-dark-text">Our Leadership</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

                <!-- Card 1 -->
                <div class="team-card rounded-2xl overflow-hidden shadow-lg bg-white" data-aos="fade-up"
                    data-aos-delay="100">
                    <div class="relative w-full h-[480px]">
                        <img src="../assests/aman.png" alt="Md. Aman Ullah"
                            class="w-full h-full object-cover object-top" />
                        <div class="absolute inset-0 team-overlay pointer-events-none"></div>
                        <div class="absolute bottom-0 left-0 p-6 text-white">
                            <p class="text-xs uppercase tracking-widest text-gold-light mb-1">Chairman</p>
                            <h3 class="text-2xl md:text-3xl font-bold">Md. Aman Ullah</h3>
                        </div>
                    </div>
                    <div class="p-6">
                        <p class="text-gray-500 italic font-display text-lg leading-relaxed">
                            "Where dreams rise higher than buildings."
                        </p>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="team-card rounded-2xl overflow-hidden shadow-lg bg-white" data-aos="fade-up"
                    data-aos-delay="200">
                    <div class="relative w-full h-[480px]">
                        <img src="../assests/hasan.jpeg" alt="Md. Hasan"
                            class="w-full h-full object-cover object-top" />
                        <div class="absolute inset-0 team-overlay pointer-events-none"></div>
                        <div class="absolute bottom-0 left-0 p-6 text-white">
                            <p class="text-xs uppercase tracking-widest text-gold-light mb-1">Managing Director</p>
                            <h3 class="text-2xl md:text-3xl font-bold">Md. Hasan</h3>
                        </div>
                    </div>
                    <div class="p-6">
                        <p class="text-gray-500 italic font-display text-lg leading-relaxed">
                            "Design is not just what it looks like — it's how it works."
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </section>


  <div id="footer"></div>


    <!-- Navbar Loader -->
    <script src="../js/main.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            easing: "ease-in-out",
        });
    </script>
    <script>
        const row = document.getElementById("imageRow");
        const leftBtn = document.getElementById("leftBtn");
        const rightBtn = document.getElementById("rightBtn");

        leftBtn.addEventListener("click", () => {
            row.scrollBy({ left: -300, behavior: "smooth" });
        });

        rightBtn.addEventListener("click", () => {
            row.scrollBy({ left: 300, behavior: "smooth" });
        });

    </script>



</body>

</html>
